model:
  name: "google/gemma-4-31B"
  revision: null

remote:
  ssh_host: "yottah100"
  project_path: "~/prajwal/autoresearch-inference-optimization"

hardware:
  gpu_type: "H100-80GB"
  num_gpus: 8
  max_tp: 4

backends_to_try:
  - sglang

server:
  health_endpoint: "http://localhost:8001/health"
  health_timeout_sec: 900
  port: 8001

optimization:
  primary_metric: "throughput_tok_per_sec"
  direction: "maximize"
  constraints:
    peak_memory_gb: { max: 320 }

benchmark:
  num_requests: 20
  concurrency: 1
  prompt_tokens: 5000
  output_tokens: 250
  prompt_cache_max_len: 4000   # 80% of 5000 tokens stay cached across requests
  prompt_randomize: true

