# =============================================================================
# Inference Optimization Configuration
# Do not modify during experiments — the agent edits serve.sh only.
# =============================================================================

model:
  name: "google/gemma-4-31B"
  revision: null

remote:
  ssh_host: "yottah100"
  project_path: "~/prajwal/autoresearch-inference-optimization"

hardware:
  gpu_type: "H100-80GB"
  num_gpus: 8

backends_to_try:
  - vllm

server:
  health_endpoint: "http://localhost:8000/health"
  health_timeout_sec: 300
  port: 8000

optimization:
  primary_metric: "throughput_tok_per_sec"
  direction: "maximize"
  constraints:
    ttft_p99_ms: { max: 500 }
    itl_p99_ms: { max: 100 }
    peak_memory_gb: { max: 75 }

benchmark:
  num_requests: 200
  concurrency: 16
  prompt_tokens: 1000
  output_tokens: 500

experiment:
  timeout_sec: 900
