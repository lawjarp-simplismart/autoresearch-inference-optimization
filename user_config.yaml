  bot_token: "8606305918:AAFSP-BKuSibTvYOVpjRWayF-TSnD5U158o"
  chat_id: "6132058584"

experiment:
  timeout_sec: 900

# Parameter grid for `engine.py gaps` — agent explores untried values
search_space:
  tensor_parallel_size: [1, 2, 4, 8]
  quantization: [fp8, awq, gptq, null]
  gpu_memory_utilization: [0.80, 0.85, 0.90, 0.95]
  max_num_seqs: [64, 128, 256, 512]
  enable_chunked_prefill: [true, false]
  max_model_len: [4096, 8192, 16384]
