# =============================================================================
# Inference Optimization Configuration
# Do not modify during experiments — the agent edits serve.sh only.
# Customize this per branch for each model/hardware combination.
# =============================================================================

model:
  name: ""          # e.g. "google/gemma-4-31B"

remote:
  ssh_host: ""      # e.g. "yottah100"
  project_path: "~/autoresearch-inference-optimization"

hardware:
  gpu_type: ""      # e.g. "H100-80GB"
  num_gpus: 8
  max_tp: 8

backends_to_try:
  - vllm

server:
  health_endpoint: "http://localhost:8000/health"
  health_timeout_sec: 300
  port: 8000

optimization:
  primary_metric: "throughput_tok_per_sec"
  direction: "maximize"
  constraints:
    ttft_p99_ms: { max: 5000 }
    itl_p99_ms: { max: 1000 }
    peak_memory_gb: { max: 600 }
  # scoring_combo: score from this specific sweep combo (optional, uses aggregated if unset)
  # scoring_combo:
  #   concurrency: 8
  #   prompt_tokens: 1000

benchmark:
  num_requests: 200
  concurrency: 16
  prompt_tokens: 1000
  output_tokens: 500

telegram:
  bot_token: ""
  chat_id: ""

experiment:
  timeout_sec: 900

# Parameter grid for `engine.py gaps` — agent explores untried values
# Update this per model/hardware to reflect the actual search space
search_space:
  tensor_parallel_size: [1, 2, 4, 8]
  quantization: [fp8, awq, gptq, null]
  gpu_memory_utilization: [0.80, 0.85, 0.90, 0.95]
  max_num_seqs: [64, 128, 256, 512]
  enable_chunked_prefill: [true, false]
  max_model_len: [4096, 8192, 16384]
